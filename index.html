<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>批量二维码生成器 · 透明叠加</title>
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }

        .app {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 32px 36px 48px;
            transition: all 0.2s;
        }

        /* ------ 头部 ------ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 small {
            font-size: 15px;
            font-weight: 400;
            color: #94a3b8;
            letter-spacing: 0;
        }
        .badge {
            background: #eef2ff;
            color: #4f46e5;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 500;
        }

        /* ------ 控制面板 ------ */
        .controls {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 28px 32px;
            background: #f8fafc;
            border-radius: 18px;
            padding: 24px 28px;
            margin-bottom: 32px;
            align-items: start;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-group label {
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-group label .unit {
            font-weight: 400;
            color: #94a3b8;
            font-size: 13px;
        }
        .control-group textarea {
            width: 100%;
            min-height: 110px;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: border 0.2s;
            background: #ffffff;
            color: #1e293b;
            line-height: 1.6;
        }
        .control-group textarea:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.10);
        }
        .control-group textarea::placeholder {
            color: #b9c4d4;
        }
        .textarea-hint {
            font-size: 13px;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            margin-top: 2px;
        }

        /* 滑块区域 */
        .sliders {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .slider-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .slider-item .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slider-item .row label {
            font-size: 14px;
            font-weight: 500;
            color: #334155;
        }
        .slider-item .row .value {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            background: #ffffff;
            padding: 0 10px;
            border-radius: 6px;
            min-width: 48px;
            text-align: center;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 5px;
            border-radius: 4px;
            background: #e2e8f0;
            outline: none;
            transition: background 0.2s;
            margin-top: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            border: 2px solid #ffffff;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
            transition: 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.12);
            background: #6366f1;
        }
        input[type="range"]::-moz-range-thumb {
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            border: 2px solid #ffffff;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
        }

        .btn-generate {
            background: #4f46e5;
            color: #fff;
            border: none;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 6px;
            width: 100%;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
        }
        .btn-generate:hover {
            background: #4338ca;
        }
        .btn-generate:active {
            transform: scale(0.98);
        }

        .control-right {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 高级设置折叠 */
        .adv-toggle {
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            padding: 4px 0;
            font-weight: 500;
        }
        .adv-toggle:hover {
            color: #4f46e5;
        }
        .adv-toggle .arrow {
            display: inline-block;
            transition: transform 0.25s;
        }
        .adv-toggle .arrow.open {
            transform: rotate(180deg);
        }

        /* ------ 预览区 ------ */
        .preview-area {
            margin-top: 8px;
        }
        .preview-area .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 15px;
            background: #fafbfc;
            border-radius: 18px;
            border: 2px dashed #e2e8f0;
        }
        .preview-area .empty-state strong {
            color: #475569;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 28px;
            padding-top: 4px;
        }

        /* 单个卡片 */
        .qr-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #edf2f7;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .qr-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        .card-body {
            position: relative;
            width: 100%;
            background-color: #fafbfc;
            /* 背景图通过 JS 动态设置，保证每个卡片独立 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            aspect-ratio: 400 / 500;
            /* 固定比例，会被JS覆盖为实际比例 */
            min-height: 200px;
            overflow: hidden;
        }

        .card-body .qr-img {
            position: absolute;
            display: block;
            image-rendering: pixelated;
            /* 保持锐利 */
            transition: all 0.08s ease;
            /* 平滑调节 */
            max-width: 90%;
            max-height: 90%;
        }

        .card-footer {
            width: 100%;
            padding: 12px 20px;
            background: #fafbfc;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-footer .text-label {
            font-size: 14px;
            color: #334155;
            font-weight: 500;
            word-break: break-all;
            flex: 1;
            min-width: 80px;
        }
        .card-footer .text-label span {
            color: #94a3b8;
            font-weight: 400;
            font-size: 13px;
            margin-right: 6px;
        }
        .card-footer .index-badge {
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            background: #f1f5f9;
            padding: 2px 12px;
            border-radius: 30px;
        }

        /* ------ 响应式 ------ */
        @media (max-width: 780px) {
            .app {
                padding: 20px 16px 32px;
            }
            .controls {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 18px 18px 22px;
            }
            .header h1 {
                font-size: 21px;
            }
            .header h1 small {
                font-size: 13px;
            }
            .card-body {
                aspect-ratio: 400 / 500;
            }
        }

        @media (max-width: 480px) {
            .app {
                padding: 14px 10px 24px;
            }
            .controls {
                padding: 14px 14px 18px;
                border-radius: 14px;
            }
            .control-group textarea {
                min-height: 80px;
                font-size: 13px;
            }
            .card-footer {
                padding: 10px 14px;
                flex-direction: column;
                align-items: flex-start;
            }
            .card-footer .text-label {
                font-size: 13px;
            }
        }

        /* 滚动条美化 */
        textarea::-webkit-scrollbar {
            width: 5px;
        }
        textarea::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #d1d9e6;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #b9c4d4;
        }

        /* loading shimmer */
        .card-body.loading {
            background: #f1f5f9 !important;
            animation: shimmer 1.2s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- 头部 -->
        <div class="header">
            <h1>
                ✦ 二维码生成器
                <small>透明叠加 · 批量</small>
            </h1>
            <span class="badge">背景图固定</span>
        </div>

        <!-- 控制面板 -->
        <div class="controls">
            <!-- 左侧：文本输入 -->
            <div class="control-group">
                <label for="textInput">输入内容 <span style="font-weight:400;color:#94a3b8;font-size:13px;">（每行一个）</span></label>
                <textarea id="textInput" placeholder="https://example.com&#10;https://google.com&#10;Hello World&#10;123456">https://example.com
                https://google.com
            Hello World</textarea>
            <div class="textarea-hint">
                <span>已输入 <strong id="lineCount">0</strong> 行</span>
                <span>批量生成，一行一个二维码</span>
            </div>
        </div>

        <!-- 右侧：控制滑块 + 按钮 -->
        <div class="control-right">
            <div class="sliders">
                <div class="slider-item">
                    <div class="row">
                        <label>📐 大小</label>
                        <span class="value" id="sizeValue">166</span>
                    </div>
                    <input type="range" id="sizeSlider" min="60" max="380" value="180" step="1" />
                </div>
                <div class="slider-item">
                    <div class="row">
                        <label>↔ 水平偏移</label>
                        <span class="value" id="leftValue">57</span>
                    </div>
                    <input type="range" id="leftSlider" min="-160" max="160" value="0" step="1" />
                </div>
                <div class="slider-item">
                    <div class="row">
                        <label>↕ 垂直偏移</label>
                        <span class="value" id="topValue">15</span>
                    </div>
                    <input type="range" id="topSlider" min="-160" max="160" value="0" step="1" />
                </div>
            </div>
            <button class="btn-generate" id="generateBtn">✦ 生成二维码</button>
        </div>
    </div>

    <!-- 预览区域 -->
    <div class="preview-area" id="previewArea">
        <div class="empty-state" id="emptyState">
            <strong>✧ 输入内容，点击生成</strong><br />
            每行生成一个二维码，透明叠加在背景图上
        </div>
        <div class="card-list" id="cardList" style="display:none;"></div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ----- DOM 引用 -----
        const textInput = document.getElementById('textInput');
        const lineCount = document.getElementById('lineCount');
        const sizeSlider = document.getElementById('sizeSlider');
        const leftSlider = document.getElementById('leftSlider');
        const topSlider = document.getElementById('topSlider');
        const sizeValue = document.getElementById('sizeValue');
        const leftValue = document.getElementById('leftValue');
        const topValue = document.getElementById('topValue');
        const generateBtn = document.getElementById('generateBtn');
        const cardList = document.getElementById('cardList');
        const emptyState = document.getElementById('emptyState');

        // ----- 固定背景图 -----
        const BG_IMAGE_URL =
            'https://i.imgs.ovh/2026/07/01/020b5fdd44116db8903987cc571720a8.png';

        // ----- 状态 -----
        let bgImageNaturalWidth = 0;
        let bgImageNaturalHeight = 0;
        let bgImageLoaded = false;
        let currentCards = []; // 存储每个卡片的 { text, dataURL }

        // ----- 更新行数统计 -----
        function updateLineCount() {
            const lines = textInput.value.split('\n').filter(l => l.trim() !== '');
            lineCount.textContent = lines.length;
        }
        textInput.addEventListener('input', updateLineCount);
        updateLineCount();

        // ----- 滑块联动显示 -----
        function syncSliderDisplay() {
            sizeValue.textContent = sizeSlider.value;
            leftValue.textContent = leftSlider.value;
            topValue.textContent = topSlider.value;
        }
        sizeSlider.addEventListener('input', syncSliderDisplay);
        leftSlider.addEventListener('input', syncSliderDisplay);
        topSlider.addEventListener('input', syncSliderDisplay);
        syncSliderDisplay();

        // ----- 加载背景图，获取尺寸 -----
        function loadBackgroundImage() {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = function() {
                    bgImageNaturalWidth = this.naturalWidth;
                    bgImageNaturalHeight = this.naturalHeight;
                    bgImageLoaded = true;
                    resolve({ width: bgImageNaturalWidth, height: bgImageNaturalHeight });
                };
                img.onerror = function() {
                    // 如果加载失败，使用默认比例 400:500
                    console.warn('背景图加载失败，使用默认比例 400:500');
                    bgImageNaturalWidth = 400;
                    bgImageNaturalHeight = 500;
                    bgImageLoaded = true;
                    resolve({ width: 400, height: 500 });
                };
                img.src = BG_IMAGE_URL;
            });
        }

        // ----- 生成单个二维码 dataURL (透明背景) -----
        function generateQRDataURL(text, size) {
            return new Promise((resolve) => {
                // 创建隐藏容器
                const container = document.createElement('div');
                container.style.cssText =
                    'position:fixed;left:-9999px;top:-9999px;width:0;height:0;overflow:hidden;';
                document.body.appendChild(container);

                try {
                    const qr = new QRCode(container, {
                        text: text || ' ',
                        width: size,
                        height: size,
                        colorDark: '#1a1a2e',
                        colorLight: 'rgba(0,0,0,0)', // 透明背景
                        correctLevel: QRCode.CorrectLevel.H,
                    });

                    // 等待绘制完成
                    requestAnimationFrame(() => {
                        const canvas = container.querySelector('canvas');
                        if (canvas) {
                            const dataURL = canvas.toDataURL('image/png');
                            document.body.removeChild(container);
                            resolve(dataURL);
                        } else {
                            document.body.removeChild(container);
                            resolve(null);
                        }
                    });
                } catch (e) {
                    console.warn('生成二维码失败:', e);
                    document.body.removeChild(container);
                    resolve(null);
                }
            });
        }

        // ----- 批量生成 -----
        async function generateAll() {
            const lines = textInput.value.split('\n').filter(l => l.trim() !== '');
            if (lines.length === 0) {
                emptyState.style.display = 'block';
                cardList.style.display = 'none';
                cardList.innerHTML = '';
                return;
            }

            // 显示加载状态
            emptyState.style.display = 'none';
            cardList.style.display = 'flex';
            cardList.innerHTML =
                '<div style="padding:40px;text-align:center;color:#94a3b8;">⏳ 生成中...</div>';

            const size = parseInt(sizeSlider.value, 10);
            const leftOffset = parseInt(leftSlider.value, 10);
            const topOffset = parseInt(topSlider.value, 10);

            // 并行生成所有二维码
            const promises = lines.map(line => generateQRDataURL(line.trim(), size));
            const results = await Promise.all(promises);

            // 过滤失败
            const cardData = [];
            for (let i = 0; i < lines.length; i++) {
                if (results[i]) {
                    cardData.push({
                        text: lines[i].trim(),
                        dataURL: results[i],
                    });
                } else {
                    // 如果生成失败，用占位
                    cardData.push({
                        text: lines[i].trim(),
                        dataURL: null,
                    });
                }
            }

            currentCards = cardData;

            // 渲染卡片
            renderCards(cardData, size, leftOffset, topOffset);
        }

        // ----- 渲染卡片 -----
        function renderCards(cardData, size, leftOffset, topOffset) {
            if (cardData.length === 0) {
                emptyState.style.display = 'block';
                cardList.style.display = 'none';
                cardList.innerHTML = '';
                return;
            }

            emptyState.style.display = 'none';
            cardList.style.display = 'flex';

            // 计算卡片比例
            const ratio = bgImageLoaded ?
                (bgImageNaturalWidth / bgImageNaturalHeight) :
                (400 / 500);

            let html = '';
            for (let i = 0; i < cardData.length; i++) {
                const item = cardData[i];
                const dataURL = item.dataURL;
                const text = item.text;

                // 用背景图作为卡片背景 (内联样式)
                const bgStyle =
                    `background-image: url('${BG_IMAGE_URL}'); background-size: cover; background-position: center;`;

                // 二维码样式：大小 + 偏移
                const qrSize = size;
                const leftPx = leftOffset;
                const topPx = topOffset;

                // 如果二维码生成失败，显示一个错误占位
                const imgSrc = dataURL || '';

                html += `
                        <div class="qr-card">
                            <div class="card-body" style="${bgStyle} aspect-ratio: ${ratio};">
                                ${dataURL ? `<img class="qr-img" src="${dataURL}" alt="QR Code" 
                                    style="width:${qrSize}px; height:${qrSize}px; 
                                    left:calc(50% + ${leftPx}px); top:calc(50% + ${topPx}px); 
                                    transform:translate(-50%, -50%);" />` 
                                    : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px;">⚠️ 生成失败</div>`}
                            </div>
                            <div class="card-footer">
                                <div class="text-label"><span>#${i+1}</span> ${escapeHtml(text)}</div>
                                <span class="index-badge">${qrSize}px</span>
                            </div>
                        </div>
                    `;
            }

            cardList.innerHTML = html;
        }

        // ----- 简单防XSS -----
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ----- 重新渲染（保留数据，只更新样式） -----
        function reRenderWithCurrentData() {
            if (currentCards.length === 0) return;
            const size = parseInt(sizeSlider.value, 10);
            const leftOffset = parseInt(leftSlider.value, 10);
            const topOffset = parseInt(topSlider.value, 10);
            renderCards(currentCards, size, leftOffset, topOffset);
        }

        // ----- 事件绑定 -----
        // 生成按钮
        generateBtn.addEventListener('click', generateAll);

        // 滑块变化时重新渲染（不重新生成二维码）
        sizeSlider.addEventListener('input', () => {
            syncSliderDisplay();
            reRenderWithCurrentData();
        });
        leftSlider.addEventListener('input', () => {
            syncSliderDisplay();
            reRenderWithCurrentData();
        });
        topSlider.addEventListener('input', () => {
            syncSliderDisplay();
            reRenderWithCurrentData();
        });

        // Ctrl+Enter 快捷生成
        textInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                generateBtn.click();
            }
        });

        // ----- 初始化 -----
        async function init() {
            // 加载背景图
            await loadBackgroundImage();

            // 如果有内容，自动生成
            const lines = textInput.value.split('\n').filter(l => l.trim() !== '');
            if (lines.length > 0) {
                // 延迟一点让UI渲染
                setTimeout(() => {
                    generateBtn.click();
                }, 100);
            } else {
                emptyState.style.display = 'block';
                cardList.style.display = 'none';
            }
        }

        // 启动
        init();

        // 暴露重新生成到全局（方便调试）
        window.regenerate = generateAll;

        console.log('✦ 二维码生成器已启动');
        console.log('  背景图:', BG_IMAGE_URL);
        console.log('  提示: 修改内容后点击「生成二维码」或按 Ctrl+Enter');

    })();
</script>

</body>
</html>
